<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Aerial illustration of Cognitio Lutheran Secondary School set in Wisdom Valley, Sai Kung">
  <defs>
    <!-- Sky / atmosphere -->
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#dbe7f1"/>
      <stop offset="50%" stop-color="#f0e6d0"/>
      <stop offset="100%" stop-color="#cbd9c4"/>
    </linearGradient>
    <!-- Sea -->
    <linearGradient id="sea" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3a5f7a"/>
      <stop offset="100%" stop-color="#1f3a52"/>
    </linearGradient>
    <!-- Distant hills -->
    <linearGradient id="far-hill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7c8a78"/>
      <stop offset="100%" stop-color="#5d6e5b"/>
    </linearGradient>
    <linearGradient id="mid-hill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#5d7754"/>
      <stop offset="100%" stop-color="#3f5638"/>
    </linearGradient>
    <linearGradient id="near-hill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#4a6440"/>
      <stop offset="100%" stop-color="#2d4128"/>
    </linearGradient>
    <!-- Buildings -->
    <linearGradient id="bldg-roof" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#a8896f"/>
      <stop offset="100%" stop-color="#7a5e47"/>
    </linearGradient>
    <linearGradient id="bldg-side" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f4ead9"/>
      <stop offset="100%" stop-color="#d9c8a8"/>
    </linearGradient>
    <linearGradient id="bldg-shadow" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#b8a684"/>
      <stop offset="100%" stop-color="#8a7558"/>
    </linearGradient>
    <linearGradient id="main-roof" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1a2754"/>
      <stop offset="100%" stop-color="#0f1936"/>
    </linearGradient>
    <linearGradient id="field" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7ea36a"/>
      <stop offset="100%" stop-color="#5a8048"/>
    </linearGradient>
    <linearGradient id="path" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#c9a85c"/>
      <stop offset="100%" stop-color="#a88a3f"/>
    </linearGradient>
    <radialGradient id="haze" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff8e8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fff8e8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="1600" height="900" fill="url(#sky)"/>
  <ellipse cx="800" cy="280" rx="900" ry="300" fill="url(#haze)"/>

  <!-- Distant hills layered -->
  <path d="M0,420 Q200,360 400,380 T800,360 T1200,370 T1600,380 L1600,500 L0,500 Z" fill="url(#far-hill)" opacity="0.85"/>
  <path d="M0,460 Q150,410 350,430 T700,410 T1100,420 T1600,430 L1600,520 L0,520 Z" fill="url(#far-hill)"/>

  <!-- Sea inlet (Sai Kung waters peeking through hills, top right) -->
  <path d="M1200,420 Q1300,400 1400,415 T1600,420 L1600,470 Q1500,460 1400,465 T1200,460 Z" fill="url(#sea)" opacity="0.7"/>
  <!-- Sea reflections -->
  <line x1="1240" y1="445" x2="1280" y2="445" stroke="#a8c4d4" stroke-width="1" opacity="0.6"/>
  <line x1="1310" y1="450" x2="1360" y2="450" stroke="#a8c4d4" stroke-width="1" opacity="0.6"/>
  <line x1="1390" y1="455" x2="1450" y2="455" stroke="#a8c4d4" stroke-width="1" opacity="0.6"/>
  <line x1="1480" y1="450" x2="1530" y2="450" stroke="#a8c4d4" stroke-width="1" opacity="0.6"/>

  <!-- Mid hills with trees -->
  <path d="M0,500 Q200,450 450,470 T900,460 T1300,475 T1600,485 L1600,600 L0,600 Z" fill="url(#mid-hill)"/>
  <!-- Tree dots on mid hills -->
  <g opacity="0.6">
    <circle cx="180" cy="500" r="6" fill="#3a5230"/>
    <circle cx="220" cy="490" r="7" fill="#2d4128"/>
    <circle cx="350" cy="495" r="5" fill="#3a5230"/>
    <circle cx="480" cy="485" r="6" fill="#2d4128"/>
    <circle cx="620" cy="490" r="7" fill="#3a5230"/>
    <circle cx="780" cy="480" r="5" fill="#2d4128"/>
    <circle cx="920" cy="485" r="6" fill="#3a5230"/>
    <circle cx="1080" cy="490" r="7" fill="#2d4128"/>
    <circle cx="1220" cy="495" r="5" fill="#3a5230"/>
    <circle cx="1380" cy="500" r="6" fill="#2d4128"/>
    <circle cx="1500" cy="505" r="5" fill="#3a5230"/>
  </g>

  <!-- Near hill (campus base) -->
  <path d="M0,600 Q300,560 600,580 T1100,575 T1600,590 L1600,900 L0,900 Z" fill="url(#near-hill)"/>

  <!-- Wisdom Valley road (winding into the valley from the left) -->
  <path d="M0,720 Q150,700 280,710 Q400,720 480,700 Q560,680 640,700 Q720,720 800,710" 
        fill="none" stroke="#c9a85c" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <path d="M0,720 Q150,700 280,710 Q400,720 480,700 Q560,680 640,700 Q720,720 800,710" 
        fill="none" stroke="#fff" stroke-width="1" stroke-dasharray="6 8" opacity="0.5"/>

  <!-- Sports field (running track + football pitch) -->
  <g transform="translate(900,640)">
    <ellipse cx="0" cy="0" rx="180" ry="80" fill="#a85f3a"/>
    <ellipse cx="0" cy="0" rx="170" ry="72" fill="url(#field)"/>
    <!-- Track lane lines -->
    <ellipse cx="0" cy="0" rx="174" ry="76" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="178" ry="79" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <!-- Pitch midline -->
    <line x1="0" y1="-72" x2="0" y2="72" stroke="#fff" stroke-width="1" opacity="0.7"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#fff" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- Main school complex (cluster of buildings on a slight rise) -->
  <g transform="translate(620,560)">
    <!-- Shadow base -->
    <ellipse cx="60" cy="180" rx="320" ry="40" fill="#1a1a1a" opacity="0.18" filter="url(#soft-shadow)"/>
    
    <!-- Main academic block (largest, central, with cross on roof) -->
    <g transform="translate(0,40)">
      <!-- Building footprint shadow -->
      <polygon points="0,80 200,60 200,140 0,160" fill="url(#bldg-shadow)" opacity="0.4"/>
      <!-- Walls -->
      <polygon points="0,40 200,20 200,140 0,160" fill="url(#bldg-side)"/>
      <polygon points="200,20 280,40 280,160 200,140" fill="url(#bldg-shadow)"/>
      <!-- Roof -->
      <polygon points="0,40 200,20 280,40 80,60" fill="url(#main-roof)"/>
      <!-- Roof ridge -->
      <line x1="40" y1="50" x2="240" y2="30" stroke="#0a1228" stroke-width="1.5"/>
      <!-- Cross atop -->
      <line x1="140" y1="0" x2="140" y2="22" stroke="#c9a85c" stroke-width="3"/>
      <line x1="132" y1="8" x2="148" y2="8" stroke="#c9a85c" stroke-width="3"/>
      <!-- Windows row 1 -->
      <g fill="#3a4a6e">
        <rect x="20" y="60" width="14" height="22"/>
        <rect x="50" y="56" width="14" height="22"/>
        <rect x="80" y="52" width="14" height="22"/>
        <rect x="110" y="48" width="14" height="22"/>
        <rect x="140" y="44" width="14" height="22"/>
        <rect x="170" y="40" width="14" height="22"/>
      </g>
      <!-- Windows row 2 -->
      <g fill="#5a6a8e">
        <rect x="20" y="92" width="14" height="22"/>
        <rect x="50" y="88" width="14" height="22"/>
        <rect x="80" y="84" width="14" height="22"/>
        <rect x="110" y="80" width="14" height="22"/>
        <rect x="140" y="76" width="14" height="22"/>
        <rect x="170" y="72" width="14" height="22"/>
      </g>
      <!-- Side windows -->
      <g fill="#3a4a6e">
        <rect x="215" y="50" width="10" height="18"/>
        <rect x="215" y="78" width="10" height="18"/>
        <rect x="240" y="60" width="10" height="18"/>
        <rect x="240" y="88" width="10" height="18"/>
      </g>
      <!-- Entrance -->
      <rect x="100" y="120" width="20" height="36" fill="#1a2754"/>
      <polygon points="100,120 120,120 116,116 104,116" fill="#7a5e47"/>
    </g>

    <!-- Left wing (lower) -->
    <g transform="translate(-160,90)">
      <polygon points="0,60 130,50 130,120 0,140" fill="url(#bldg-side)"/>
      <polygon points="130,50 180,60 180,130 130,120" fill="url(#bldg-shadow)"/>
      <polygon points="0,60 130,50 180,60 50,75" fill="url(#bldg-roof)"/>
      <g fill="#3a4a6e">
        <rect x="14" y="78" width="10" height="16"/>
        <rect x="34" y="76" width="10" height="16"/>
        <rect x="54" y="74" width="10" height="16"/>
        <rect x="74" y="72" width="10" height="16"/>
        <rect x="94" y="70" width="10" height="16"/>
        <rect x="14" y="104" width="10" height="16"/>
        <rect x="34" y="102" width="10" height="16"/>
        <rect x="54" y="100" width="10" height="16"/>
        <rect x="74" y="98" width="10" height="16"/>
        <rect x="94" y="96" width="10" height="16"/>
      </g>
    </g>

    <!-- Right wing (chapel/library, with peaked roof) -->
    <g transform="translate(290,80)">
      <polygon points="0,70 80,60 80,130 0,140" fill="url(#bldg-side)"/>
      <polygon points="80,60 130,75 130,140 80,130" fill="url(#bldg-shadow)"/>
      <!-- Peaked roof -->
      <polygon points="0,70 40,30 80,60 130,75 90,40" fill="url(#main-roof)"/>
      <polygon points="0,70 40,30 80,60" fill="#0f1936"/>
      <!-- Round window -->
      <circle cx="40" cy="55" r="8" fill="#c9a85c"/>
      <line x1="40" y1="47" x2="40" y2="63" stroke="#1a1a1a" stroke-width="0.8"/>
      <line x1="32" y1="55" x2="48" y2="55" stroke="#1a1a1a" stroke-width="0.8"/>
      <!-- Lower windows -->
      <g fill="#3a4a6e">
        <rect x="14" y="90" width="10" height="22"/>
        <rect x="34" y="88" width="10" height="22"/>
        <rect x="54" y="86" width="10" height="22"/>
      </g>
    </g>

    <!-- Connecting walkway -->
    <polygon points="-30,170 80,160 90,180 -20,190" fill="#d9c8a8" opacity="0.7"/>

    <!-- Trees around campus -->
    <g>
      <circle cx="-180" cy="210" r="14" fill="#3a5230"/>
      <circle cx="-155" cy="218" r="10" fill="#2d4128"/>
      <circle cx="-130" cy="205" r="12" fill="#3a5230"/>
      <circle cx="350" cy="200" r="14" fill="#3a5230"/>
      <circle cx="380" cy="215" r="10" fill="#2d4128"/>
      <circle cx="410" cy="205" r="12" fill="#3a5230"/>
      <circle cx="-50" cy="220" r="9" fill="#2d4128"/>
      <circle cx="100" cy="210" r="11" fill="#3a5230"/>
      <circle cx="220" cy="220" r="10" fill="#3a5230"/>
    </g>

    <!-- Courtyard -->
    <ellipse cx="120" cy="195" rx="60" ry="14" fill="#c9a85c" opacity="0.4"/>
    <circle cx="120" cy="195" r="6" fill="#c9a85c"/>
  </g>

  <!-- Foreground vegetation hint -->
  <g opacity="0.85">
    <ellipse cx="80" cy="850" rx="120" ry="40" fill="#2d4128"/>
    <ellipse cx="1500" cy="860" rx="140" ry="50" fill="#2d4128"/>
    <ellipse cx="-20" cy="900" rx="180" ry="60" fill="#1f2e1c"/>
  </g>

  <!-- Birds (small detail) -->
  <g fill="none" stroke="#3a3a3a" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <path d="M340,200 Q345,196 350,200 Q355,196 360,200"/>
    <path d="M380,220 Q384,217 388,220 Q392,217 396,220"/>
    <path d="M1280,180 Q1284,177 1288,180 Q1292,177 1296,180"/>
  </g>

  <!-- Subtle vignette -->
  <rect width="1600" height="900" fill="url(#haze)" opacity="0.3"/>
</svg>
