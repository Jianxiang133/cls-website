<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Police shield and badge">
  <defs>
    <linearGradient id="s-bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#c9a85c"/>
      <stop offset="100%" stop-color="#1a2754"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#s-bg)"/>
  <circle cx="300" cy="200" r="150" fill="#fff8e8" opacity="0.1"/>
  <g transform="translate(300,200)">
    <!-- Shield -->
    <path d="M0,-90 L70,-70 L70,30 Q70,80 0,100 Q-70,80 -70,30 L-70,-70 Z" fill="#1a2754" stroke="#c9a85c" stroke-width="3"/>
    <path d="M0,-78 L60,-60 L60,28 Q60,72 0,90 Q-60,72 -60,28 L-60,-60 Z" fill="none" stroke="#c9a85c" stroke-width="1.5"/>
    <!-- Star -->
    <polygon points="0,-50 10,-20 42,-20 16,0 26,30 0,12 -26,30 -16,0 -42,-20 -10,-20" fill="#c9a85c"/>
    <text x="0" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#c9a85c" letter-spacing="2">JPC</text>
  </g>
  <text x="300" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#fff" opacity="0.9" letter-spacing="3">CITIZENSHIP</text>
</svg>
