<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Open envelope with letter">
  <defs>
    <linearGradient id="e-bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#2d3a6d"/>
      <stop offset="100%" stop-color="#1a2754"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#e-bg)"/>
  <circle cx="300" cy="200" r="150" fill="#fff8e8" opacity="0.08"/>
  <g transform="translate(300,200)">
    <rect x="-100" y="-65" width="200" height="130" rx="4" fill="#f4ead9" stroke="#c9a85c" stroke-width="2"/>
    <line x1="-100" y1="-65" x2="0" y2="20" stroke="#c9a85c" stroke-width="2"/>
    <line x1="100" y1="-65" x2="0" y2="20" stroke="#c9a85c" stroke-width="2"/>
    <!-- Letter peeking -->
    <rect x="-80" y="-90" width="160" height="100" fill="#fff" stroke="#c9a85c" stroke-width="1.5"/>
    <line x1="-65" y1="-70" x2="65" y2="-70" stroke="#1a2754" stroke-width="1.5"/>
    <line x1="-65" y1="-58" x2="40" y2="-58" stroke="#5a5a5a" stroke-width="1"/>
    <line x1="-65" y1="-48" x2="55" y2="-48" stroke="#5a5a5a" stroke-width="1"/>
    <line x1="-65" y1="-38" x2="30" y2="-38" stroke="#5a5a5a" stroke-width="1"/>
    <line x1="-65" y1="-28" x2="45" y2="-28" stroke="#5a5a5a" stroke-width="1"/>
    <!-- Wax seal -->
    <circle cx="50" cy="0" r="14" fill="#a85f3a"/>
    <text x="50" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#fff">C</text>
  </g>
  <text x="300" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#fff" opacity="0.9" letter-spacing="3">ADMISSIONS</text>
</svg>
