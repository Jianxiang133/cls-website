<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Rugby ball and pitch">
  <defs>
    <linearGradient id="r-bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#5a8048"/>
      <stop offset="100%" stop-color="#2d4128"/>
    </linearGradient>
    <linearGradient id="r-ball" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#a85f3a"/>
      <stop offset="100%" stop-color="#6a3a20"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#r-bg)"/>
  <!-- Pitch lines -->
  <line x1="0" y1="100" x2="600" y2="100" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <line x1="0" y1="300" x2="600" y2="300" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <line x1="300" y1="0" x2="300" y2="400" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <!-- Ball -->
  <g transform="translate(300,200) rotate(-25)">
    <ellipse cx="0" cy="0" rx="100" ry="55" fill="url(#r-ball)"/>
    <ellipse cx="0" cy="0" rx="100" ry="55" fill="none" stroke="#3a1f0e" stroke-width="2"/>
    <line x1="-70" y1="0" x2="70" y2="0" stroke="#fff" stroke-width="3"/>
    <line x1="-50" y1="-10" x2="-50" y2="10" stroke="#fff" stroke-width="2"/>
    <line x1="-30" y1="-10" x2="-30" y2="10" stroke="#fff" stroke-width="2"/>
    <line x1="-10" y1="-10" x2="-10" y2="10" stroke="#fff" stroke-width="2"/>
    <line x1="10" y1="-10" x2="10" y2="10" stroke="#fff" stroke-width="2"/>
    <line x1="30" y1="-10" x2="30" y2="10" stroke="#fff" stroke-width="2"/>
    <line x1="50" y1="-10" x2="50" y2="10" stroke="#fff" stroke-width="2"/>
  </g>
  <text x="300" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#fff" opacity="0.9" letter-spacing="3">ATHLETICS</text>
</svg>
