<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Music notes and ribbon">
  <defs>
    <linearGradient id="mu-bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#a88a3f"/>
      <stop offset="100%" stop-color="#1a2754"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#mu-bg)"/>
  <!-- Staff lines -->
  <g stroke="#fff8e8" stroke-width="1.5" opacity="0.4">
    <line x1="80" y1="160" x2="520" y2="160"/>
    <line x1="80" y1="180" x2="520" y2="180"/>
    <line x1="80" y1="200" x2="520" y2="200"/>
    <line x1="80" y1="220" x2="520" y2="220"/>
    <line x1="80" y1="240" x2="520" y2="240"/>
  </g>
  <!-- Treble clef -->
  <g transform="translate(140,200)" fill="none" stroke="#fff8e8" stroke-width="4" stroke-linecap="round">
    <path d="M0,-50 Q-25,-30 -10,0 Q10,30 -10,60 Q-30,80 -10,100"/>
    <circle cx="-12" cy="40" r="14" fill="#fff8e8"/>
  </g>
  <!-- Notes -->
  <g fill="#fff8e8">
    <ellipse cx="240" cy="200" rx="14" ry="10" transform="rotate(-20 240 200)"/>
    <line x1="251" y1="195" x2="251" y2="140" stroke="#fff8e8" stroke-width="3"/>
    <ellipse cx="320" cy="180" rx="14" ry="10" transform="rotate(-20 320 180)"/>
    <line x1="331" y1="175" x2="331" y2="120" stroke="#fff8e8" stroke-width="3"/>
    <ellipse cx="400" cy="220" rx="14" ry="10" transform="rotate(-20 400 220)"/>
    <line x1="411" y1="215" x2="411" y2="160" stroke="#fff8e8" stroke-width="3"/>
    <ellipse cx="470" cy="200" rx="14" ry="10" transform="rotate(-20 470 200)"/>
    <line x1="481" y1="195" x2="481" y2="140" stroke="#fff8e8" stroke-width="3"/>
    <!-- Beam -->
    <polygon points="251,140 481,120 481,128 251,148" fill="#fff8e8" opacity="0.7"/>
  </g>
  <text x="300" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#fff" opacity="0.9" letter-spacing="3">THE ARTS</text>
</svg>
